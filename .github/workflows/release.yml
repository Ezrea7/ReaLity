name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: read version
        id: ver
        run: |
          VER="v$(cat VERSION | tr -d '[:space:]')"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
      - name: package repository
        run: |
          zip -9r code.zip . -x '.git/*'
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.ver }}
          files: code.zip
          overwrite_files: true
          make_latest: true
          generate_release_notes: true
